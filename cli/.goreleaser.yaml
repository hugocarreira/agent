version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/agentrc
    binary: agentrc-{{ .Os }}-{{ .Arch }}

archives:
  - format: binary
    name_template: "{{ .Binary }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
